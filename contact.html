<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="organic.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
    <title>Contact Us - Organic Farming</title>
    <style>
       body{
            background-image: url('organicF.jpg'); 
            background-size: cover;
            background-position: center;
        }
        .contact-box {
            width: 50%;
            margin: 5% auto;
            padding: 2rem;
            background: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            text-align: center;
        }
        .contact-box h1 {
            margin-bottom: 1rem;
        }
        .contact-box p {
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }
        .contact-box .contact-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .contact-box input, .contact-box textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .contact-box button {
            background: green;
            color: white;
            padding: 0.8rem;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        @media (max-width: 768px) {
            .contact-box {
                width: 80%;
            }
        }
    </style>
</head>
<body>
    <div class="main"> 
        <div class="nav">
            <div class="title"><h2>Organic Farming</h2></div>
            <div class="nav2">
                <h4 onclick="window.location.href='index.html'">HOME</h4>
                <div class="dropdown">
                    <h4>PRODUCT</h4>
                    <div class="dropdown-content">
                        <a href="Beetroot.html">Beetroot</a>
                        <a href="Carrot.html">Carrot</a>
                        <a href="Corn.html">Corn</a>
                        <a href="Cabbage.html">Cabbage</a>
                        <a href="Ginger.html">Ginger</a>
                        <a href="Onion.html">Onion</a>
                        <a href="Wheat.html">Wheat</a>
                    </div>
                </div>
                <h4 onclick="window.location.href='about.html'">ABOUT US</h4>
                <h4 onclick="window.location.href='contact.html'">CONTACT US</h4>
            </div>
             <!-- Mobile Menu Toggle Button -->
        <label for="menu-toggle" class="menu-icon">
        <i class="ri-menu-3-line"></i>
        </label>
        </div>
        <div class="contact-box">
            <h1>Contact Us</h1>
            <p>Email: info@organicfarming.com</p>
            <p>Phone: +123 456 7890</p>
            <p>Address: 123 Greenway Road, Farmville</p>
            <div class="contact-form">
                <input type="text" placeholder="Your Name">
                <input type="email" placeholder="Your Email">
                <textarea placeholder="Your Message" rows="4"></textarea>
                <button>Submit</button>
            </div>

        </div>
    </div>

</body>
</html>
